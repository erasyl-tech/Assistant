<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панелі</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .status-online { background-color: #10b981; }
        .status-offline { background-color: #9ca3af; }
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🔐 Админ панелі</h1>
                <p id="sessionInfo" class="text-gray-500 mt-1"></p>
            </div>
            <a href="/" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition">← Басты бет</a>
        </div>
        
        <div class="grid lg:grid-cols-3 gap-6">
            <!-- Сол жақ: Тест жүктеу және параметрлер -->
            <div class="space-y-6">
                <!-- Тест жүктеу -->
                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <h2 class="text-xl font-bold mb-4">📤 Тест жүктеу</h2>
                    <form id="uploadForm">
                        <input type="text" id="testName" placeholder="Тест атауы" class="w-full p-3 border border-gray-300 rounded-lg mb-3">
                        <input type="file" id="testFile" accept=".txt" class="w-full p-2 border border-gray-300 rounded-lg mb-4">
                        <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
                            📂 Жүктеу
                        </button>
                    </form>
                </div>
                
                <!-- Тесттер тізімі -->
                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <h2 class="text-xl font-bold mb-4">📋 Тесттер</h2>
                    <div id="testsList" class="space-y-2 max-h-60 overflow-y-auto">
                        <div class="text-gray-500 text-center py-4">Жүктелуде...</div>
                    </div>
                </div>
                
                <!-- Параметрлер -->
                <div id="settingsPanel" class="bg-white rounded-2xl shadow-sm p-6 hidden">
                    <h2 class="text-xl font-bold mb-4">⚙️ Тест параметрлері</h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Сұрақтарды таңдау:</label>
                        <select id="questionSelectMode" class="w-full p-2 border rounded-lg mb-2" onchange="toggleQuestionMode()">
                            <option value="all">Барлық сұрақтар</option>
                            <option value="range">Диапазон бойынша</option>
                            <option value="random">Кездейсоқ сұрақтар</option>
                        </select>
                        <div id="rangeInput" class="hidden">
                            <input type="text" id="questionRange" placeholder="Мысалы: 1-50" class="w-full p-2 border rounded-lg">
                        </div>
                        <div id="randomInput" class="hidden">
                            <select id="randomCount" class="w-full p-2 border rounded-lg">
                                <option value="10">10 сұрақ</option>
                                <option value="20">20 сұрақ</option>
                                <option value="30">30 сұрақ</option>
                                <option value="40">40 сұрақ</option>
                                <option value="50">50 сұрақ</option>
                                <option value="100">100 сұрақ</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="flex items-center">
                            <input type="checkbox" id="shuffleQuestions" class="mr-2">
                            <span class="text-sm">Сұрақтарды араластыру</span>
                        </label>
                        <label class="flex items-center mt-2">
                            <input type="checkbox" id="shuffleAnswers" class="mr-2">
                            <span class="text-sm">Жауаптарды араластыру</span>
                        </label>
                    </div>
                    
                    <button id="createSessionBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                        🚀 Сессия бастау
                    </button>
                </div>
            </div>
            
            <!-- Оң жақ: Мониторинг -->
            <div class="lg:col-span-2">
                <div id="monitoringPanel" class="bg-white rounded-2xl shadow-sm p-6 hidden">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-xl font-bold text-gray-800">📊 Тест мониторингі</h2>
                            <p id="testNameDisplay" class="text-gray-500"></p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-blue-600" id="sessionCodeDisplay"></div>
                            <button id="startTestBtn" class="mt-2 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                                🎯 Тестті бастау
                            </button>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <h3 class="font-semibold mb-3">👥 Қатысушылар (<span id="participantCount">0</span>)</h3>
                        <div id="participantsList" class="space-y-3 max-h-96 overflow-y-auto">
                            <div class="text-gray-500 text-center py-8">Қатысушылар күтілуде...</div>
                        </div>
                    </div>
                    
                    <div id="finishedResults" class="mt-6 hidden">
                        <h3 class="font-semibold mb-3">🏆 Нәтижелер рейтингі</h3>
                        <div id="rankingList" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let socket = null;
        let currentSessionCode = null;
        let currentTestId = null;
        let currentQuestionsCount = 0;
        
        // Тесттерді жүктеу
        async function loadTests() {
            const res = await fetch('/api/tests');
            const tests = await res.json();
            const container = document.getElementById('testsList');
            
            if (tests.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center py-4">📭 Тесттер жоқ</div>';
                return;
            }
            
            container.innerHTML = tests.map(test => `
                <div class="border rounded-lg p-3 hover:bg-gray-50 cursor-pointer transition ${currentTestId === test.id ? 'border-blue-500 bg-blue-50' : ''}"
                     onclick="selectTest('${test.id}', '${escapeHtml(test.name)}', ${test.questionCount})">
                    <div class="font-medium">${escapeHtml(test.name)}</div>
                    <div class="text-sm text-gray-500">${test.questionCount} сұрақ</div>
                </div>
            `).join('');
        }
        
        function selectTest(id, name, count) {
            currentTestId = id;
            currentQuestionsCount = count;
            document.getElementById('settingsPanel').classList.remove('hidden');
            loadTests(); // Жаңарту
        }
        
        function toggleQuestionMode() {
            const mode = document.getElementById('questionSelectMode').value;
            document.getElementById('rangeInput').classList.add('hidden');
            document.getElementById('randomInput').classList.add('hidden');
            
            if (mode === 'range') {
                document.getElementById('rangeInput').classList.remove('hidden');
            } else if (mode === 'random') {
                document.getElementById('randomInput').classList.remove('hidden');
            }
        }
        
        // Сессия бастау
        document.getElementById('createSessionBtn').addEventListener('click', () => {
            if (!currentTestId) {
                alert('Тест таңдаңыз!');
                return;
            }
            
            const mode = document.getElementById('questionSelectMode').value;
            let settings = {
                shuffleQuestions: document.getElementById('shuffleQuestions').checked,
                shuffleAnswers: document.getElementById('shuffleAnswers').checked
            };
            
            if (mode === 'range') {
                const range = document.getElementById('questionRange').value;
                if (!range) {
                    alert('Диапазонды енгізіңіз!');
                    return;
                }
                settings.questionRange = range;
            } else if (mode === 'random') {
                settings.randomCount = document.getElementById('randomCount').value;
            } else {
                settings.allQuestions = true;
            }
            
            socket = io();
            
            socket.on('connect', () => {
                socket.emit('admin-create-session', { testId: currentTestId, settings });
            });
            
            socket.on('session-created', (data) => {
                currentSessionCode = data.sessionCode;
                document.getElementById('sessionCodeDisplay').innerHTML = `Код: ${data.sessionCode}`;
                document.getElementById('testNameDisplay').innerHTML = `Тест: ${data.totalQuestions} сұрақ`;
                document.getElementById('sessionInfo').innerHTML = `Сессия коды: ${data.sessionCode}`;
                document.getElementById('monitoringPanel').classList.remove('hidden');
            });
            
            socket.on('participants-update', (participants) => {
                const container = document.getElementById('participantsList');
                document.getElementById('participantCount').innerHTML = participants.length;
                
                if (participants.length === 0) {
                    container.innerHTML = '<div class="text-gray-500 text-center py-8">Қатысушылар күтілуде...</div>';
                    return;
                }
                
                container.innerHTML = participants.map(p => `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <div>
                            <div class="font-medium">${escapeHtml(p.name)}</div>
                            <div class="text-sm text-gray-500">${p.answered} / ${data.totalQuestions} жауап берді</div>
                        </div>
                        <div class="w-32">
                            <div class="bg-gray-200 rounded-full h-2">
                                <div class="bg-blue-600 h-2 rounded-full progress-bar" style="width: ${(p.answered / data.totalQuestions) * 100}%"></div>
                            </div>
                        </div>
                    </div>
                `).join('');
            });
            
            socket.on('participant-progress', (data) => {
                // Прогресті жаңарту - participants-update арқылы жаңарады
            });
            
            socket.on('participant-finished', (data) => {
                // Нәтижелерді көрсету
            });
            
            socket.on('all-finished', (data) => {
                const ranking = data.ranking;
                const container = document.getElementById('rankingList');
                document.getElementById('finishedResults').classList.remove('hidden');
                
                container.innerHTML = ranking.map((r, idx) => `
                    <div class="flex justify-between items-center p-3 ${idx === 0 ? 'bg-yellow-50 border border-yellow-200' : 'bg-gray-50'} rounded-lg">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full ${idx === 0 ? 'bg-yellow-500' : idx === 1 ? 'bg-gray-400' : idx === 2 ? 'bg-orange-400' : 'bg-gray-300'} text-white flex items-center justify-center font-bold">
                                ${idx + 1}
                            </div>
                            <div>
                                <div class="font-medium">${escapeHtml(r.name)}</div>
                                <div class="text-xs text-gray-500">⏱️ ${Math.floor(r.timeSpent / 60)}м ${r.timeSpent % 60}с</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-bold ${r.score >= 80 ? 'text-green-600' : r.score >= 50 ? 'text-yellow-600' : 'text-red-600'}">
                                ${r.score}%
                            </div>
                            <div class="text-xs text-gray-500">${r.correctCount} дұрыс</div>
                        </div>
                    </div>
                `).join('');
            });
            
            document.getElementById('startTestBtn').onclick = () => {
                if (currentSessionCode) {
                    socket.emit('admin-start-test', { sessionCode: currentSessionCode });
                    document.getElementById('startTestBtn').disabled = true;
                    document.getElementById('startTestBtn').innerHTML = '✅ Тест басталды';
                }
            };
        });
        
        // Файл жүктеу
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('testFile');
            const testName = document.getElementById('testName').value;
            
            if (!fileInput.files[0]) {
                alert('Файл таңдаңыз!');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            if (testName) formData.append('name', testName);
            
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                alert(`Тест сәтті жүктелді! ${data.questionCount} сұрақ`);
                document.getElementById('testFile').value = '';
                document.getElementById('testName').value = '';
                loadTests();
            } else {
                alert('Қате: ' + data.error);
            }
        });
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadTests();
    </script>
</body>
</html>
