<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест платформасы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .btn-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4">
        <div class="text-center text-white mb-12">
            <h1 class="text-5xl font-bold mb-4">📚 Тест платформасы</h1>
            <p class="text-xl opacity-90">Біліміңізді сынаңыз, нәтижелеріңізді бақылаңыз</p>
        </div>
        
        <div class="max-w-2xl mx-auto">
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Қолданушы карточкасы -->
                <div class="bg-white rounded-2xl shadow-2xl p-8 text-center btn-hover cursor-pointer" onclick="showParticipantModal()">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">👨‍🎓 Қолданушы</h2>
                    <p class="text-gray-500 mb-4">Тест тапсыру үшін кіріңіз</p>
                    <button class="bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-700 transition">
                        Тест тапсыру →
                    </button>
                </div>
                
                <!-- Админ карточкасы -->
                <div class="bg-white rounded-2xl shadow-2xl p-8 text-center btn-hover cursor-pointer" onclick="showAdminModal()">
                    <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">👨‍💼 Админ</h2>
                    <p class="text-gray-500 mb-4">Тесттерді басқару және бақылау</p>
                    <button class="bg-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-purple-700 transition">
                        Кіру →
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Қолданушы модальды терезесі -->
    <div id="participantModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-4">👨‍🎓 Тестке қосылу</h2>
            <input type="text" id="participantName" placeholder="Аты-жөніңіз" class="w-full p-3 border border-gray-300 rounded-lg mb-4">
            <input type="text" id="participantCode" placeholder="Тест коды (6 цифр)" class="w-full p-3 border border-gray-300 rounded-lg mb-6">
            <div class="flex gap-3">
                <button onclick="closeParticipantModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg">Болдырмау</button>
                <button onclick="joinTest()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg">Қосылу</button>
            </div>
        </div>
    </div>
    
    <!-- Админ модальды терезесі -->
    <div id="adminModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-4">🔐 Админ кіру</h2>
            <input type="password" id="adminPassword" placeholder="Пароль" class="w-full p-3 border border-gray-300 rounded-lg mb-6">
            <div class="flex gap-3">
                <button onclick="closeAdminModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg">Болдырмау</button>
                <button onclick="loginAdmin()" class="flex-1 bg-purple-600 text-white py-3 rounded-lg">Кіру</button>
            </div>
        </div>
    </div>
    
    <script>
        function showParticipantModal() {
            document.getElementById('participantModal').classList.remove('hidden');
        }
        
        function closeParticipantModal() {
            document.getElementById('participantModal').classList.add('hidden');
        }
        
        function showAdminModal() {
            document.getElementById('adminModal').classList.remove('hidden');
        }
        
        function closeAdminModal() {
            document.getElementById('adminModal').classList.add('hidden');
        }
        
        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin12344') {
                window.location.href = '/admin.html';
            } else {
                alert('Қате пароль!');
            }
        }
        
        function joinTest() {
            const name = document.getElementById('participantName').value.trim();
            const code = document.getElementById('participantCode').value.trim();
            
            if (!name) {
                alert('Аты-жөніңізді енгізіңіз!');
                return;
            }
            if (!code || code.length !== 6) {
                alert('6 цифрлы кодты енгізіңіз!');
                return;
            }
            
            localStorage.setItem('participantName', name);
            localStorage.setItem('sessionCode', code);
            window.location.href = '/waiting.html';
        }
    </script>
</body>
</html>
